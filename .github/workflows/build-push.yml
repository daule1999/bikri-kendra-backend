name: build-backend-monolith
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build'
        required: true
        default: 'main'

env:
  REGISTRY: ghcr.io
  ORG: <org>
  IMAGE: vy/bikri-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          SHA=$(git rev-parse --short HEAD)
          echo "immutable=${REF}-${SHA}" >> $GITHUB_OUTPUT
          echo "moving=${REF}" >> $GITHUB_OUTPUT

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE }}:${{ steps.tags.outputs.immutable }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE }}:${{ steps.tags.outputs.moving }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-gitops:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: <org>/bikri-gitops
          token: ${{ secrets.GITOPS_PAT }}

      - name: Bump image tag + open PR
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          TAG="${REF}-${GITHUB_SHA::7}"
          (cd apps/backend-monolith/overlays/local && kustomize edit set image \
            ghcr.io/<org>/vy/bikri-backend=ghcr.io/<org>/vy/bikri-backend:$TAG)
          git config user.name "ci-bot" && git config user.email "ci@users.noreply.github.com"
          BRANCH="deploy/backend-$TAG"
          git checkout -b "$BRANCH"
          git commit -am "deploy(backend-monolith): $TAG" || exit 0
          git push origin "$BRANCH"
          gh pr create --fill --title "Deploy backend $TAG" --body "ArgoCD pull-based deploy."
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
