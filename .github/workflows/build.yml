name: build-backend-monolith
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build'
        required: true
        default: 'main'

env:
  REGISTRY: ghcr.io
  ORG: ${{ github.repository_owner }} 
  IMAGE: vy/bikri-backend

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: 
      contents: read 
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref_name }}
          fetch-depth: 0

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          CLEAN_REF=$(echo "$REF" | sed 's/\//-/g')
          SHA=$(git rev-parse --short HEAD || echo "${GITHUB_SHA::7}")
          
          echo "immutable=${CLEAN_REF}-${SHA}" >> $GITHUB_OUTPUT
          echo "moving=${CLEAN_REF}" >> $GITHUB_OUTPUT

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE }}:${{ steps.tags.outputs.immutable }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE }}:${{ steps.tags.outputs.moving }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-gitops:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/bikri-kendra-gitops
          token: ${{ secrets.GITOPS_PAT }}

      - name: Bump image tag + open PR
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          CLEAN_REF=$(echo "$REF" | sed 's/\//-/g')
          SHA=$(git rev-parse --short HEAD || echo "${GITHUB_SHA::7}")
          TAG="${CLEAN_REF}-${SHA}"
          
          (cd apps/backend-monolith/overlays/local && kustomize edit set image \
            ${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE }}=${{ env.REGISTRY }}/${{ env.ORG }}/${{ env.IMAGE }}:$TAG)
          
          git config user.name "ci-bot" 
          git config user.email "ci@users.noreply.github.com"
          
          BRANCH="deploy/backend-$TAG"
          git checkout -b "$BRANCH"
          git commit -am "deploy(backend-monolith): $TAG" || exit 0
          git push --force origin "$BRANCH"
          gh pr create --fill --title "Deploy backend $TAG" --body "ArgoCD pull-based deploy." || echo "PR already exists for $BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}